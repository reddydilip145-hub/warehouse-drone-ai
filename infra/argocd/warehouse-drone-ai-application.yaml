apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: warehouse-drone-ai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/reddydilip145-hub/warehouse-drone-ai.git
    targetRevision: main
    path: infra/helm/warehouse-drone-ai
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: warehouse-drone-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

