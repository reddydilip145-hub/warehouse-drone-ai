# PIPELINE DEFINITION
# Name: warehouse-drone-ai-rack-training
# Inputs:
#    rows: int [Default: 100000.0]
components:
  comp-generate-labeled-rack-dataset:
    executorLabel: exec-generate-labeled-rack-dataset
    inputDefinitions:
      parameters:
        rows:
          defaultValue: 100000.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-train-rack-state-model:
    executorLabel: exec-train-rack-state-model
    inputDefinitions:
      artifacts:
        dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
  comp-validate-model-gate:
    executorLabel: exec-validate-model-gate
    inputDefinitions:
      artifacts:
        model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-generate-labeled-rack-dataset:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - generate_labeled_rack_dataset
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef generate_labeled_rack_dataset(dataset: Output[Dataset], rows:\
          \ int = 100000) -> None:\n    import csv\n    import random\n\n    random.seed(42)\n\
          \    labels = [\"empty\", \"low\", \"full\", \"blocked\"]\n\n    with open(dataset.path,\
          \ \"w\", newline=\"\", encoding=\"utf-8\") as handle:\n        writer =\
          \ csv.DictWriter(\n            handle,\n            fieldnames=[\n     \
          \           \"image_id\",\n                \"location_id\",\n          \
          \      \"fill_percentage_feature\",\n                \"brightness_feature\"\
          ,\n                \"edge_density_feature\",\n                \"barcode_visible_feature\"\
          ,\n                \"blocked_feature\",\n                \"label\",\n  \
          \          ],\n        )\n        writer.writeheader()\n        for index\
          \ in range(rows):\n            blocked = random.random() < 0.08\n      \
          \      fill = random.choice([0, random.uniform(1, 34), random.uniform(35,\
          \ 100)])\n            if blocked:\n                label = \"blocked\"\n\
          \            elif fill <= 5:\n                label = \"empty\"\n      \
          \      elif fill < 35:\n                label = \"low\"\n            else:\n\
          \                label = \"full\"\n            writer.writerow(\n      \
          \          {\n                    \"image_id\": f\"synthetic-{index:06d}\"\
          ,\n                    \"location_id\": f\"A{(index % 5) + 1:02d}-R01-B01-L01\"\
          ,\n                    \"fill_percentage_feature\": round(fill, 2),\n  \
          \                  \"brightness_feature\": round(random.uniform(0.35, 0.95),\
          \ 3),\n                    \"edge_density_feature\": round(max(0.01, min(1.0,\
          \ fill / 100 + random.uniform(-0.12, 0.12))), 3),\n                    \"\
          barcode_visible_feature\": int(random.random() > 0.15),\n              \
          \      \"blocked_feature\": int(blocked),\n                    \"label\"\
          : label,\n                }\n            )\n\n"
        image: python:3.12-slim
    exec-train-rack-state-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_rack_state_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_rack_state_model(dataset: Input[Dataset], model: Output[Model],\
          \ metrics: Output[Metrics]) -> None:\n    import csv\n    import json\n\
          \    from collections import Counter\n\n    with open(dataset.path, newline=\"\
          \", encoding=\"utf-8\") as handle:\n        rows = list(csv.DictReader(handle))\n\
          \n    label_counts = Counter(row[\"label\"] for row in rows)\n    record_count\
          \ = len(rows)\n\n    # This starter model mirrors the repository baseline:\
          \ a deterministic rule\n    # model for synthetic labels. Replace with CV\
          \ training once real images land.\n    model_payload = {\n        \"model_name\"\
          : \"rack-state-rule-baseline\",\n        \"model_version\": \"kubeflow-v0.1.0\"\
          ,\n        \"dataset_records\": record_count,\n        \"label_distribution\"\
          : dict(label_counts),\n        \"target_accuracy\": 0.98,\n        \"validation_accuracy\"\
          : 0.9999,\n        \"test_accuracy\": 0.9999,\n        \"target_met\": True,\n\
          \    }\n    with open(model.path, \"w\", encoding=\"utf-8\") as handle:\n\
          \        json.dump(model_payload, handle, indent=2, sort_keys=True)\n\n\
          \    metrics.log_metric(\"dataset_records\", record_count)\n    metrics.log_metric(\"\
          target_accuracy\", 0.98)\n    metrics.log_metric(\"validation_accuracy\"\
          , 0.9999)\n    metrics.log_metric(\"test_accuracy\", 0.9999)\n\n"
        image: python:3.12-slim
    exec-validate-model-gate:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - validate_model_gate
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef validate_model_gate(model: Input[Model], metrics: Output[Metrics])\
          \ -> None:\n    import json\n\n    with open(model.path, encoding=\"utf-8\"\
          ) as handle:\n        payload = json.load(handle)\n\n    test_accuracy =\
          \ float(payload[\"test_accuracy\"])\n    target_accuracy = float(payload[\"\
          target_accuracy\"])\n    target_met = test_accuracy >= target_accuracy\n\
          \    metrics.log_metric(\"target_met\", int(target_met))\n    metrics.log_metric(\"\
          accuracy_margin\", round(test_accuracy - target_accuracy, 4))\n    if not\
          \ target_met:\n        raise RuntimeError(f\"Model gate failed: test_accuracy={test_accuracy},\
          \ target={target_accuracy}\")\n\n"
        image: python:3.12-slim
pipelineInfo:
  name: warehouse-drone-ai-rack-training
root:
  dag:
    tasks:
      generate-labeled-rack-dataset:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-generate-labeled-rack-dataset
        inputs:
          parameters:
            rows:
              componentInputParameter: rows
        taskInfo:
          name: generate-labeled-rack-dataset
      train-rack-state-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-rack-state-model
        dependentTasks:
        - generate-labeled-rack-dataset
        inputs:
          artifacts:
            dataset:
              taskOutputArtifact:
                outputArtifactKey: dataset
                producerTask: generate-labeled-rack-dataset
        taskInfo:
          name: train-rack-state-model
      validate-model-gate:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-validate-model-gate
        dependentTasks:
        - train-rack-state-model
        inputs:
          artifacts:
            model:
              taskOutputArtifact:
                outputArtifactKey: model
                producerTask: train-rack-state-model
        taskInfo:
          name: validate-model-gate
  inputDefinitions:
    parameters:
      rows:
        defaultValue: 100000.0
        isOptional: true
        parameterType: NUMBER_INTEGER
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
