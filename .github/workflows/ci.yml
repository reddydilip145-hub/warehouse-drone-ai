name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Run local phase pipeline
        run: python scripts/run_local_pipeline.py

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build inspection API image
        run: docker build -f services/inspection_api/Dockerfile -t warehouse-drone-ai/inspection-api:ci .
      - name: Build replenishment API image
        run: docker build -f services/replenishment_api/Dockerfile -t warehouse-drone-ai/replenishment-api:ci .

